# .github/workflows/nextjs.yml
name: Next.js CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, prod]

# env:
  # VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  # VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

  preview-deploy:
    needs: test
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/prod'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $url"

  qa-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: qa
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to QA
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "::set-output name=url::$url"

  prod-deploy:
      needs: [test, qa-deploy]
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      environment:
        name: production
        url: ${{ steps.deploy.outputs.url }}
      # The deployment will pause here waiting for manual approval
      # Configure this in your GitHub repository:
      # Settings -> Environments -> production -> Add protection rule -> Required reviewers
      steps:
        - uses: actions/checkout@v3
        
        - name: Install Vercel CLI
          run: npm install --global vercel@latest
        
        - name: Pull Vercel Environment Information
          run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
        - name: Deploy to Production
          id: deploy
          run: |
            url=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
            echo "::set-output name=url::$url"